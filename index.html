<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STEP Face Viewer – FaceID Mode</title>

    <!--
        coi-serviceworker: GitHub Pages では HTTP ヘッダを自由に設定できないため、
        ServiceWorker で以下を注入し SharedArrayBuffer を有効化する。
        Cross-Origin-Opener-Policy: same-origin
        Cross-Origin-Embedder-Policy: require-corp
        これにより opencascade.js の WASM マルチスレッド版が動作する。
    -->
    <script type="importmap">
    {
        "imports": {
            "three": "./libs/three/three.module.js",
            "three/examples/jsm/controls/OrbitControls.js": "./libs/three/OrbitControls.js"
        }
    }
    </script>
    <script src="./coi-serviceworker.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #viewer {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ドラッグオーバー時のハイライト */
        #viewer-container.dragover::after {
            content: 'STEPファイルをドロップ';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: rgba(80, 160, 255, 0.25);
            border: 3px dashed #50a0ff;
            pointer-events: none;
        }

        /* ローディングオーバーレイ */
        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #7dd3fc;
            padding: 18px 32px;
            border-radius: 10px;
            font-size: 1rem;
            letter-spacing: 0.05em;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        /* 左サイドパネル */
        #sidebar {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 220px;
            background: rgba(20,20,28,0.92);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
        }

        #sidebar h2 {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #7dd3fc;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .ctrl-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-row label {
            font-size: 0.72rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }

        /* ファイルボタン */
        .file-btn {
            display: inline-block;
            background: #1e40af;
            color: #fff;
            font-size: 0.78rem;
            padding: 7px 12px;
            border-radius: 7px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }
        .file-btn:hover { background: #2563eb; }
        input[type="file"] { display: none; }

        /* カラーピッカー */
        #colorPicker {
            width: 100%;
            height: 34px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        /* パレット */
        .palette {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .palette-btn {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.1s;
        }
        .palette-btn:hover {
            border-color: #fff;
            transform: scale(1.15);
        }

        /* アクションボタン */
        .action-btn {
            background: #374151;
            color: #e0e0e0;
            border: 1px solid #4b5563;
            padding: 7px 10px;
            border-radius: 7px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
        }
        .action-btn:hover { background: #4b5563; }
        .action-btn:disabled { opacity: 0.4; cursor: default; }

        /* 情報表示 */
        #info-box {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(20,20,28,0.92);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.76rem;
            color: #aaa;
            z-index: 10;
            min-width: 180px;
            line-height: 1.8;
        }
        #info-box span { color: #7dd3fc; font-weight: 600; }

        /* モード表示バッジ */
        #mode-badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,28,0.88);
            border: 1px solid #334;
            border-radius: 999px;
            padding: 6px 18px;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: #7dd3fc;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="viewer-container">
    <canvas id="viewer"></canvas>

    <div id="loading">Initializing OpenCascade...</div>

    <!-- 左サイドパネル -->
    <div id="sidebar">
        <h2>STEP Face Viewer</h2>

        <div class="ctrl-row">
            <label>STEPファイル</label>
            <label class="file-btn">
                📂 ファイルを開く
                <input type="file" id="stepFile" accept=".step,.stp" />
            </label>
        </div>

        <div class="ctrl-row">
            <label>ブラシカラー</label>
            <input type="color" id="colorPicker" value="#e74c3c" />
        </div>

        <div class="ctrl-row">
            <label>カラーパレット</label>
            <div class="palette">
                <button class="palette-btn" data-color="#e74c3c" style="background:#e74c3c" title="Red"></button>
                <button class="palette-btn" data-color="#e67e22" style="background:#e67e22" title="Orange"></button>
                <button class="palette-btn" data-color="#f1c40f" style="background:#f1c40f" title="Yellow"></button>
                <button class="palette-btn" data-color="#2ecc71" style="background:#2ecc71" title="Green"></button>
                <button class="palette-btn" data-color="#3498db" style="background:#3498db" title="Blue"></button>
                <button class="palette-btn" data-color="#9b59b6" style="background:#9b59b6" title="Purple"></button>
                <button class="palette-btn" data-color="#1abc9c" style="background:#1abc9c" title="Teal"></button>
                <button class="palette-btn" data-color="#ecf0f1" style="background:#ecf0f1" title="White"></button>
                <button class="palette-btn" data-color="#7f8c8d" style="background:#7f8c8d" title="Gray"></button>
                <button class="palette-btn" data-color="#b2bec3" style="background:#b2bec3" title="Silver"></button>
            </div>
        </div>

        <button class="action-btn" id="undoButton">↩ Undo</button>
        
        <button class="action-btn" id="toggleEdgesButton">エッジ表示切替</button>
        <button id="toggleGridButton">グリッド非表示</button>

        <div class="ctrl-row">
            <label>視点切り替え</label>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px;">
                <button class="action-btn" id="viewPosX" style="padding: 4px;">+X</button>
                <button class="action-btn" id="viewNegX" style="padding: 4px;">-X</button>
                <button class="action-btn" id="viewPosY" style="padding: 4px;">+Y</button>
                <button class="action-btn" id="viewNegY" style="padding: 4px;">-Y</button>
                <button class="action-btn" id="viewPosZ" style="padding: 4px;">+Z</button>
                <button class="action-btn" id="viewNegZ" style="padding: 4px;">-Z</button>
            </div>
            <button class="action-btn" id="centerButton" style="margin-top: 4px; background: #047857; border-color: #059669;">🎯 センタリング</button>
        </div>

        <div class="ctrl-row">
            <button class="action-btn" id="saveColorsButton">💾 カラーを保存</button>
            <label class="action-btn" style="display:block;cursor:pointer;">
                📥 カラーを読み込み
                <input type="file" id="importColorsFile" accept=".json" />
            </label>
        </div>
    </div>

    <!-- 右上 情報 -->
    <div id="info-box">
        Face ID: <span id="faceId">—</span><br>
        Surface: <span id="meshName">—</span><br>
        Triangles: <span id="triCount">—</span>
    </div>

    <!-- 下部モードバッジ -->
    <div id="mode-badge">⬡ FaceID MODE — opencascade.js</div>
</div>


    
<!-- main.js は ES Module として読み込む -->
<script type="module" src="./main.js"></script>

</body>
</html>
